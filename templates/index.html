<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prédiction Churn Client - API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #f0f9ff;
            border-left: 4px solid #667eea;
        }

        .result.error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
        }

        .result-title {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .result.success .result-title {
            color: #667eea;
        }

        .result.error .result-title {
            color: #ef4444;
        }

        .result-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .result-content {
                grid-template-columns: 1fr;
            }
        }

        .result-item {
            padding: 15px;
            background: white;
            border-radius: 6px;
        }

        .result-item .label {
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .result-item .value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }

        .prediction-badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 5px;
        }

        .badge-churn {
            background: #fee2e2;
            color: #dc2626;
        }

        .badge-no-churn {
            background: #dcfce7;
            color: #16a34a;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .error-message {
            color: #ef4444;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .info-box h3 {
            color: #333;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .info-box p {
            color: #666;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Prédiction Churn Client</h1>
        <p class="subtitle">Testez le modèle de machine learning en entrant les informations du client</p>

        <form id="predictionForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="age">Âge du Client (minimum 18 ans)</label>
                    <input type="number" id="age" name="age" placeholder="Ex: 35" min="18" required>
                </div>
                <div class="form-group">
                    <label for="accountManager">Account Manager (0 ou 1)</label>
                    <input type="number" id="accountManager" name="accountManager" placeholder="0 ou 1" min="0" max="1" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="years">Années d'expérience (≤ âge du client)</label>
                    <input type="number" id="years" name="years" placeholder="Ex: 5" min="0" required>
                </div>
                <div class="form-group">
                    <label for="numSites">Nombre de Sites</label>
                    <input type="number" id="numSites" name="numSites" placeholder="Ex: 10" min="0" required>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-predict">🚀 Prédire</button>
                <button type="reset" class="btn-reset">🔄 Réinitialiser</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Traitement en cours...</p>
        </div>

        <div class="result" id="result">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-content" id="resultContent"></div>
        </div>

        <div class="result" id="errorResult">
            <div class="result-title">❌ Erreur</div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="info-box">
            <h3>ℹ️ Informations sur le modèle</h3>
            <p>
                <strong>Features utilisés:</strong> Age, Account Manager, Years, Num_Sites<br>
                <strong>Modèle:</strong> Régression Logistique<br>
                <strong>Objectif:</strong> Prédire le risque de churn client
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('errorResult');
        const loadingDiv = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Récupérer les valeurs du formulaire
            const age = parseFloat(document.getElementById('age').value);
            const accountManager = parseFloat(document.getElementById('accountManager').value);
            const years = parseFloat(document.getElementById('years').value);
            const numSites = parseFloat(document.getElementById('numSites').value);

            // Validation basique
            if (accountManager !== 0 && accountManager !== 1) {
                showError('Account Manager doit être 0 ou 1');
                return;
            }

            if (age < 18) {
                showError('Âge illégal : le client doit avoir au moins 18 ans');
                return;
            }

            if (years < 0 || numSites < 0) {
                showError('Les valeurs ne peuvent pas être négatives');
                return;
            }

            if (years > age) {
                showError('Le nombre d\'années d\'expérience ne peut pas être supérieur à l\'âge');
                return;
            }

            // Afficher le spinner de chargement
            loadingDiv.classList.add('show');
            resultDiv.classList.remove('show');
            errorDiv.classList.remove('show');

            try {
                // Faire l'appel API
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        age: age,
                        account_manager: accountManager,
                        years: years,
                        num_sites: numSites
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Erreur lors de la prédiction');
                    return;
                }

                // Afficher les résultats
                showResult(data);
            } catch (error) {
                showError('Erreur de connexion: ' + error.message);
            } finally {
                loadingDiv.classList.remove('show');
            }
        });

        function showResult(data) {
            const isCchurn = data.prediction === 1;
            const predictionClass = isCchurn ? 'badge-churn' : 'badge-no-churn';
            const predictionEmoji = isCchurn ? '⚠️' : '✅';

            const resultHTML = `
                <div class="result-item">
                    <div class="label">Prédiction</div>
                    <div class="value">
                        ${predictionEmoji} ${data.prediction_text}
                        <div class="prediction-badge ${predictionClass}">
                            ${data.prediction === 1 ? 'RISQUE' : 'SÛRE'}
                        </div>
                    </div>
                </div>
                <div class="result-item">
                    <div class="label">Confiance</div>
                    <div class="value">${data.confidence.toFixed(1)}%</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${data.confidence}%"></div>
                    </div>
                </div>
                <div class="result-item">
                    <div class="label">Probabilité Pas de Churn</div>
                    <div class="value">${(data.probability_no_churn * 100).toFixed(2)}%</div>
                </div>
                <div class="result-item">
                    <div class="label">Probabilité Churn</div>
                    <div class="value">${(data.probability_churn * 100).toFixed(2)}%</div>
                </div>
            `;

            document.getElementById('resultContent').innerHTML = resultHTML;
            document.getElementById('resultTitle').textContent = isCchurn ? '🚨 ALERTE: Risque de churn détecté' : '✅ Pas de risque de churn';
            resultDiv.className = isCchurn ? 'result show error' : 'result show success';
            resultDiv.classList.add('show');
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            errorDiv.classList.add('show');
        }
    </script>
</body>
</html>
